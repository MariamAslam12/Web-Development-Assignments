<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Form</title>
</head>
<body>
    <fieldset>
   <legend><h2>Account Details:</h2></legend>
    <form action="#" method="post">
   <label for="Username">
        Username:
        <input type="text" name="Username" id="Username" placeholder="Enter Your Username">
    </label><br><br>
    <label for="Email Address">
        Email Address:
        <input type="email" name="Email Address" id="Email Address" placeholder="Enter Your Email Address">
    </label><br><br>
    <label for="Password">
        Password:
<input type="password" name="Password" id="Password" placeholder="Enter Your Password">
    </label><br><br> 
</fieldset>
    <fieldset>
    <legend><h2>Personal Details:</h2></legend>
   <label for="First Name">
    First Name:
    <input type="text" name="First Name" id="First Name" placeholder="Enter Your First Name">
   </label><br><br>
   <label for="Last Name">
    Last Name:
    <input type="text" name="Last Name" id="Last Name" placeholder="Enter Your Last Name">
   </label><br><br>
   <label for="">
    Gender: <br>
<input type="radio" name="Gender" value="Male">Male<br>
<input type="radio" name="Gender" value="Female">Female
</label><br><br>
Date Of Birth:
<input type="date" name="Date Of Birth"><br><br></fieldset>
<fieldset>
<legend><h2>Review Section:</h2></legend>
Rating: 
<select name="Rating" id="">
    <option value="Poor">Poor</option><br>
    <option value="Average">Average</option><br>
<option value="Good">Good</option><br>
<option value="Excellent">Excellent</option>
</select><br><br>
<label for="Feedback">
    Feedback:
<textarea name="Feedback" id="Feedback" placeholder="Enter Your Feedback"></textarea></label></fieldset><br><br>
<button>Submit Review</button></form>

</body>
</html>
